<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EPP Editor</title>
<style>
  :root{
    --editor-bg:#1b1b1a;
    --editor-fg:#e7e2d3;
    --editor-fg-dim:#a39d8c;
    --accent:#c98a3e;
    --paper-bg:#faf6ec;
    --paper-ink:#211c14;
    --rule:#b9af98;
    --serif: 'Iowan Old Style','Palatino Linotype', Palatino, Georgia, serif;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }

  #site-nav{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; height:48px;
    background:var(--editor-bg); border-bottom:1px solid #33322c;
  }
  .site-logo{
    display:flex; align-items:baseline; gap:10px;
    font-family:var(--serif); font-style:italic; font-size:18px;
    color:var(--editor-fg); text-decoration:none; letter-spacing:.01em;
  }
  .site-logo .ver{
    font-family:var(--mono); font-style:normal; font-size:10px;
    letter-spacing:.1em; text-transform:uppercase;
    color:var(--accent); border:1px solid var(--accent);
    border-radius:3px; padding:1px 5px; margin-left:4px;
  }
  .site-tabs{ display:flex; gap:2px; }
  .site-tab{
    text-decoration:none; display:inline-block;
    background:transparent; border:none; cursor:pointer;
    font-family:var(--mono); font-size:11px; letter-spacing:.07em; text-transform:uppercase;
    color:var(--editor-fg-dim); padding:14px 14px; border-bottom:2px solid transparent;
    transition:color .15s, border-color .15s;
  }
  .site-tab:hover{ color:var(--editor-fg); }
  .site-tab.active{ color:var(--accent); border-bottom-color:var(--accent); }
  body{
    background:var(--editor-bg);
    color:var(--editor-fg);
    font-family:var(--mono);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  button:focus-visible, input:focus-visible, [contenteditable]:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:0 16px;
    height:48px;
    flex:0 0 auto;
    border-bottom:1px solid #33322c;
  }
  .brand{ display:flex; align-items:center; gap:12px; min-width:0; }
  .brand-name{ font-size:13px; letter-spacing:.12em; text-transform:uppercase; flex:0 0 auto; }
  #titleInput{
    background:transparent;
    border:none;
    border-bottom:1px dashed transparent;
    color:var(--editor-fg-dim);
    font-family:var(--serif);
    font-style:italic;
    font-size:13px;
    padding:3px 0;
    min-width:0;
    width:180px;
  }
  #titleInput:hover, #titleInput:focus{ border-bottom-color:var(--accent); color:var(--editor-fg); outline:none; }
  .header-right{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .seg{ display:flex; border:1px solid #4a4940; border-radius:4px; overflow:hidden; }
  .seg button{
    background:transparent; border:none; color:var(--editor-fg-dim);
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em;
    padding:6px 10px; cursor:pointer;
  }
  .seg button + button{ border-left:1px solid #4a4940; }
  .seg button.active{ background:var(--accent); color:#1b1b1a; }
  .stamp{
    font-size:10px; letter-spacing:.08em; color:var(--accent);
    border:1px solid var(--accent); border-radius:3px; padding:2px 6px; text-transform:uppercase;
  }
  button.ghost{
    background:transparent; border:1px solid #4a4940; color:var(--editor-fg);
    font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase;
    padding:6px 10px; border-radius:3px; cursor:pointer; white-space:nowrap;
  }
  button.ghost:hover{ border-color:var(--accent); color:var(--accent); }

  #toolbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:14px;
    padding:8px 16px;
    background:#222220;
    border-bottom:1px solid #33322c;
    flex-wrap:wrap;
  }
  #toolbar.hidden{ display:none; }
  #toolbar.disabled{ opacity:.35; pointer-events:none; }
  #toolbar select{
    background:#2c2b27; color:var(--editor-fg); border:1px solid #4a4940;
    font-family:var(--mono); font-size:11px; padding:5px 6px; border-radius:3px;
  }
  .tb-group{ display:flex; align-items:center; gap:5px; }
  .tb-sep{ width:1px; height:20px; background:#3a3930; }
  .tb-btn{
    background:transparent; border:1px solid #4a4940; color:var(--editor-fg);
    width:28px; height:28px; border-radius:3px; cursor:pointer; font-size:12px; font-family:var(--serif);
  }
  .tb-btn.bold-btn{ font-weight:700; }
  .tb-btn.ital-btn{ font-style:italic; }
  .tb-btn.under-btn{ text-decoration:underline; }
  .tb-btn:hover{ border-color:var(--accent); }
  .tb-btn.active{ background:var(--accent); border-color:var(--accent); color:#1b1b1a; }
  .swatch{
    width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  }
  .swatch.active{ border-color:var(--editor-fg); }

  main{
    flex:1 1 auto;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#141413;
    padding:24px 24px 16px;
  }
  .nav-row{ display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
  .nav-row button{
    background:transparent; border:1px solid #4a4940; color:var(--editor-fg);
    padding:5px 10px; border-radius:3px; cursor:pointer; font-size:12px; font-family:var(--mono);
  }
  .nav-row button:hover:not(:disabled){ border-color:var(--accent); color:var(--accent); }
  .nav-row button:disabled{ opacity:.3; cursor:default; }
  #pageIndicator{ font-size:11px; letter-spacing:.08em; color:var(--editor-fg-dim); min-width:60px; text-align:center; }

  #paper{
    position:relative;
    width:min(560px, 92%);
    background:var(--paper-bg);
    color:var(--paper-ink);
    box-shadow:0 18px 40px rgba(0,0,0,.45);
    font-family:var(--serif);
    font-size:15px;
    line-height:1.6;
  }

  /* ---- paper chrome (header/footer bands) ---- */
  .paper-header-band, .paper-footer-band{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.06em;
    text-align:center;
    color:#8a8270;
    border-bottom:1px solid #c8be9e;
    padding:7px 40px;
  }
  .paper-footer-band{
    border-bottom:none;
    border-top:1px solid #c8be9e;
  }
  .paper-body{ padding:36px 40px 24px; min-height:calc(min(560px, 92%) * 1.25); position:relative; }

  /* ---- edit-mode blocks ---- */
  .block-row{ position:relative; padding-left:26px; margin-bottom:10px; }
  .block-handle{
    position:absolute; left:0; top:2px; display:flex; flex-direction:column; gap:1px;
    opacity:0; transition:opacity .1s ease;
  }
  .block-row:hover .block-handle, .block-row:focus-within .block-handle{ opacity:1; }
  .h-btn{
    width:18px; height:16px; font-size:10px; line-height:1; border:none; background:transparent;
    color:#8a8270; cursor:pointer; font-family:var(--mono);
  }
  .h-btn:hover{ color:var(--accent); }
  .block-content{ outline:none; min-height:1.4em; }
  .block-content:empty:before{ content:attr(data-placeholder); color:#9a9382; font-style:italic; }
  .heading-content{ font-size:21px; font-weight:600; margin-bottom:2px; }
  .bullet-content{ padding-left:1.1em; position:relative; }
  .bullet-content:before{ content:'•'; position:absolute; left:0; color:var(--paper-ink); }
  .code-content{
    font-family:var(--mono); font-size:13px; background:#efe9da;
    border-left:3px solid var(--accent); padding:8px 10px; white-space:pre-wrap;
  }
  .block-space-visual{
    height:14px; border-top:1px dashed #c8be9e; margin-top:8px;
    font-size:9px; color:#8a8270; text-align:center; letter-spacing:.1em; text-transform:uppercase;
  }
  .block-label-visual{
    display:flex; align-items:center; gap:6px; background:#f1e6cf; border:1px dashed var(--accent);
    border-radius:3px; padding:4px 8px;
  }
  .label-name-input{
    flex:1; border:none; background:transparent; font-family:var(--mono); font-size:11px;
    color:#7a5424; outline:none; letter-spacing:.03em;
  }
  /* quote/line/table in edit mode */
  .quote-content{
    border-left:3px solid var(--accent); padding:6px 10px;
    font-style:italic; color:#5b564a;
  }
  .block-line-visual{
    border:none; border-top:1px dashed #c8be9e; margin:6px 0;
  }
  .table-edit-visual{
    font-size:12px; color:#7a5424; background:#f1e6cf;
    border:1px dashed var(--accent); border-radius:3px; padding:6px 10px;
    font-family:var(--mono);
  }

  .add-block-row{ margin-top:6px; position:relative; }
  .add-block-row button{
    background:transparent; border:1px dashed #c8be9e; color:#8a8270;
    font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase;
    padding:6px 12px; border-radius:3px; cursor:pointer; width:100%;
  }
  .add-block-row button:hover{ border-color:var(--accent); color:var(--accent); }
  .add-menu{
    position:absolute; top:110%; left:0; background:#222220; border:1px solid #4a4940;
    border-radius:5px; box-shadow:0 8px 20px rgba(0,0,0,.5); overflow:hidden; z-index:5; min-width:180px;
  }
  .add-menu button{
    display:block; width:100%; text-align:left; background:transparent; border:none;
    color:var(--editor-fg); font-family:var(--mono); font-size:12px; padding:8px 12px; cursor:pointer;
  }
  .add-menu button:hover{ background:#2c2b27; color:var(--accent); }

  /* ---- preview-mode ---- */
  #paper .epp-heading{ font-size:22px; font-weight:600; margin:0 0 14px; }
  #paper .epp-text{ margin:0 0 12px; }
  #paper .epp-space{ height:18px; }
  #paper ul.epp-bullets{ list-style:none; padding:0; margin:0 0 12px; }
  #paper ul.epp-bullets li{ display:flex; gap:8px; margin-bottom:3px; }
  #paper .epp-bullet-glyph{ color:var(--accent); font-family:var(--mono); font-size:.9em; flex:0 0 1.4em; text-align:right; }
  #paper .epp-code{
    font-family:var(--mono); font-size:13px; background:#efe9da; border-left:3px solid var(--accent);
    padding:10px 12px; margin:0 0 12px; white-space:pre-wrap; color:var(--paper-ink);
  }
  #paper .epp-quote{
    border-left:3px solid var(--accent); padding:8px 14px;
    font-style:italic; color:#5b564a; margin:0 0 12px;
  }
  #paper .epp-line{ border:none; border-top:1px solid #c8be9e; margin:10px 0 16px; }
  #paper .epp-table{ width:100%; border-collapse:collapse; margin:0 0 14px; font-size:14px; }
  #paper .epp-table th,#paper .epp-table td{ border:1px solid #c8be9e; padding:5px 10px; text-align:left; }
  #paper .epp-table thead tr{ background:#ede7d6; font-weight:700; }
  #paper .epp-table tbody tr:nth-child(even){ background:#f4f0e6; }
  #paper .empty-hint{ font-style:italic; color:#8a8270; }
  .label-tab{
    position:absolute; right:-15px; transform:translateY(-50%) rotate(90deg); transform-origin:left center;
    background:var(--accent); color:#1b1b1a; font-family:var(--mono); font-size:9px; letter-spacing:.06em;
    text-transform:uppercase; padding:2px 7px; border-radius:2px; white-space:nowrap; box-shadow:0 2px 4px rgba(0,0,0,.3);
  }

  .footer-hint{
    flex:0 0 auto; margin-top:14px; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:#5b5950;
    text-align:center;
  }

  #sourceModal{
    position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
    align-items:center; justify-content:center; z-index:50;
  }
  #sourceModal.open{ display:flex; }
  .modal-box{
    background:var(--editor-bg); border:1px solid #4a4940; border-radius:6px;
    width:min(640px,90vw); max-height:80vh; display:flex; flex-direction:column; overflow:hidden;
  }
  .modal-head{
    display:flex; justify-content:space-between; align-items:center; padding:10px 14px;
    border-bottom:1px solid #33322c; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--editor-fg-dim);
  }
  .modal-head button{ background:transparent; border:none; color:var(--editor-fg-dim); cursor:pointer; font-size:14px; }
  #sourceText{
    margin:0; padding:14px; font-family:var(--mono); font-size:12px; line-height:1.6;
    color:var(--editor-fg); overflow:auto; white-space:pre-wrap;
  }
  .modal-foot{ padding:10px 14px; border-top:1px solid #33322c; display:flex; justify-content:flex-end; }
</style>
</head>

<main>

<script>
/* ========================================================
   Data model
   ======================================================== */
const COLOR_MAP = {
  black:'#211c14', red:'#a23b2e', blue:'#2e5c8a', green:'#3c6b3f',
  gray:'#5b564a', grey:'#5b564a', white:'#faf6ec', amber:'#c98a3e',
  orange:'#c98a3e', purple:'#5b3a6b'
};
const SWATCH_COLORS = ['black','red','blue','green','gray','amber','purple'];
const ALIGN_VALUES = ['left','center','right'];
const TEXT_TYPES = ['heading','text','bullet','code','quote'];
const BULLET_GLYPHS = { disc:'•', number:null, check:'✓', arrow:'→', star:'★' };

let blockIdCounter = 1;
function newBlock(type, text=''){
  const b = { id:blockIdCounter++, type, text:text||'', attrs:{} };
  if (type==='label') b.name='mark'+b.id;
  return b;
}
function newPageModel(){ return { number:null, blocks:[] }; }
function newDocModel(){ return { version:'0.2', title:'', meta:{}, header:null, footer:null, pages:[newPageModel()] }; }

function escapeForEPP(str){
  return str.split('[newline]').map(seg =>
    seg.replace(/\\\\/g,'\\\\').replace(/"/g,'\\"').replace(/\[/g,'\\[').replace(/\]/g,'\\]')
  ).join('[newline]');
}

function serializeAttrs(attrs){
  if (!attrs) return '';
  const parts=[];
  if ('color' in attrs) parts.push('color='+attrs.color);
  if (attrs.bold) parts.push('bold');
  if (attrs.italic) parts.push('italic');
  if (attrs.underline) parts.push('underline');
  if ('align' in attrs) parts.push('align='+attrs.align);
  if ('type' in attrs) parts.push('type='+attrs.type);
  return parts.length ? '{'+parts.join(',')+'}' : '';
}

function serializeEPP(doc){
  let out = '%epp='+(doc.version||'0.2')+'%\n';
  // meta
  Object.entries(doc.meta||{}).forEach(([k,v]) => { out += '@meta '+k+'="'+escapeForEPP(v)+'"\n'; });
  if (doc.title) out += '@title "'+escapeForEPP(doc.title)+'"\n';
  if (doc.header) out += '@header "'+escapeForEPP(doc.header)+'"\n';
  if (doc.footer) out += '@footer "'+escapeForEPP(doc.footer)+'"\n';
  doc.pages.forEach((page,pIdx) => {
    if (pIdx>0) out += '@newpage\n';
    if (page.number) out += '@page '+page.number+'\n';
    page.blocks.forEach(block => {
      if (block.type==='space'){ out+='@space\n'; return; }
      if (block.type==='line'){ out+='@line\n'; return; }
      if (block.type==='label'){ out+='@label '+block.name+'\n'; return; }
      if (block.type==='table'){
        out+='@table "'+escapeForEPP(block.headers.join('|'))+'"\n';
        (block.rows||[]).forEach(r => { out+='@row "'+escapeForEPP(r.join('|'))+'"\n'; });
        return;
      }
      const a = serializeAttrs(block.attrs);
      out += '@'+block.type+' "'+escapeForEPP(block.text)+'"'+(a?' '+a:'')+'\n';
    });
  });
  return out;
}

function parseEPP(source){
  let i=0; const n=source.length;
  let title=null, version=null, header=null, footer=null;
  const meta={}, pages=[];
  let current={number:null,blocks:[]};
  const isWS=c=>c===' '||c==='\t'||c==='\n'||c==='\r';
  function skip(){ while(i<n){ const c=source[i]; if(isWS(c)){i++;continue;} if(c===';'){while(i<n&&source[i]!=='\n')i++;continue;} break; } }
  function word(){ const s=i; while(i<n&&!isWS(source[i])&&source[i]!=='{'&&source[i]!==';')i++; return source.slice(s,i); }
  function qs(){
    i++; let o='';
    while(i<n){ const c=source[i];
      if(c==='\\'){ const nx=source[i+1]; if(nx==='"'||nx==='['||nx===']'||nx==='\\'){o+=nx;i+=2;continue;} o+=c;i++;continue; }
      if(c==='"'){i++;break;} if(c==='\n'){o+=' ';i++;continue;} o+=c;i++;
    } return o;
  }
  function attrs(){
    i++; const s=i; while(i<n&&source[i]!=='}')i++;
    const inner=source.slice(s,i); if(i<n)i++;
    const a={};
    inner.split(',').forEach(p=>{ p=p.trim(); if(!p)return;
      if(p.includes('=')){ let[k,v]=p.split('='); k=k.trim().toLowerCase(); v=v.trim().toLowerCase();
        if(k==='aling')k='align'; a[k]=v;
      } else a[p.toLowerCase()]=true;
    }); return a;
  }
  function inlineKV(){ skip(); const s=i; while(i<n&&!isWS(source[i])&&source[i]!==';')i++; const tok=source.slice(s,i);
    if(tok.includes('=')){ let[k,...r]=tok.split('='); let v=r.join('='); if(v.startsWith('"')&&v.endsWith('"'))v=v.slice(1,-1); return[k.trim().toLowerCase(),v.trim()]; }
    return[tok.trim().toLowerCase(),''];
  }
  skip();
  if(source[i]==='%'){ i++; const s=i; while(i<n&&source[i]!=='%')i++; const raw=source.slice(s,i); if(i<n)i++; const m=raw.match(/epp=(.+)/); version=m?m[1]:raw; }
  while(true){
    skip(); if(i>=n)break;
    if(source[i]!=='@'){i++;continue;} i++;
    const cmd=word().toLowerCase();
    if(cmd==='newpage'){pages.push(current);current={number:null,blocks:[]};continue;}
    if(cmd==='page'){skip();current.number=word();continue;}
    if(cmd==='title'){skip();if(source[i]==='"')title=qs();continue;}
    if(cmd==='label'){skip();const name=word();current.blocks.push({type:'label',name});continue;}
    if(cmd==='space'){current.blocks.push({type:'space'});continue;}
    if(cmd==='line'){current.blocks.push({type:'line'});continue;}
    if(cmd==='meta'){const[k,v]=inlineKV();meta[k]=v;if(k==='title'&&!title)title=v;continue;}
    if(cmd==='header'){skip();if(source[i]==='"')header=qs();continue;}
    if(cmd==='footer'){skip();if(source[i]==='"')footer=qs();continue;}
    if(cmd==='quote'){skip();let t='';if(source[i]==='"')t=qs();current.blocks.push({type:'quote',text:t,attrs:{}});continue;}
    if(cmd==='table'){skip();let hdrs=[];if(source[i]==='"')hdrs=qs().split('|');current.blocks.push({type:'table',headers:hdrs,rows:[],attrs:{}});continue;}
    if(cmd==='row'){skip();let cells=[];if(source[i]==='"')cells=qs().split('|');const lt=[...current.blocks].reverse().find(b=>b.type==='table');if(lt)lt.rows.push(cells);continue;}
    if(TEXT_TYPES.includes(cmd)){
      skip(); let t=''; if(source[i]==='"')t=qs(); skip(); let a={}; if(source[i]==='{')a=attrs();
      current.blocks.push({type:cmd,text:t,attrs:a}); continue;
    }
    skip(); if(source[i]==='"')qs(); skip(); if(source[i]==='{')attrs();
  }
  pages.push(current);
  return {version,title,meta,header,footer,pages};
}

function hydrate(parsed){
  const doc={version:parsed.version||'0.2',title:parsed.title||'',meta:parsed.meta||{},header:parsed.header||null,footer:parsed.footer||null,pages:[]};
  parsed.pages.forEach(p=>{
    const page={number:p.number||null,blocks:[]};
    p.blocks.forEach(b=>{
      if(b.type==='table'){
        page.blocks.push({id:blockIdCounter++,type:'table',headers:[...(b.headers||[])],rows:(b.rows||[]).map(r=>[...r]),attrs:{}});
        return;
      }
      const block={id:blockIdCounter++,type:b.type,attrs:b.attrs||{}};
      if(b.type==='label')block.name=b.name;
      else block.text=b.text||'';
      page.blocks.push(block);
    });
    doc.pages.push(page);
  });
  if(doc.pages.length===0)doc.pages.push(newPageModel());
  return doc;
}

/* ========================================================
   App state
   ======================================================== */
const SAMPLE = `%epp=0.2%
; Metadata
@meta title="EPP Example Document"
@meta author="SD"
@meta version="0.2"
; Printed on every page
@header "EPP Example Document"
@footer "Page [page]"
@page 1
@title "Easy Paper Package"
@heading "Introduction" {align=center,bold,italic,underline}
@text "EPP is a lightweight UTF-8 document format designed for creating printable documents."
@space
@quote "Simple formats survive longer than complicated ones."
@line
@heading "Features"
@bullet "UTF-8 text only"
@bullet "Multi-page documents"
@bullet "Easy parsing"
@bullet "Human readable"
@space
@heading "Installation Steps"
@bullet "Download the renderer" {type=number}
@bullet "Open an .epp document" {type=number}
@bullet "Print or export" {type=number}
@label intro_end
@newpage
@page 2
@heading "Tables"
@text "EPP supports simple text tables."
@table "Name|Role|Age"
@row "Alice|Developer|25"
@row "Bob|Designer|30"
@row "Charlie|Writer|22"
@space
@heading "Code Example"
@code "print('Hello World')[newline]print('Welcome to EPP')"
@line
@heading "Bullet Styles"
@bullet "Standard bullet" {type=disc}
@bullet "Check bullet" {type=check}
@bullet "Arrow bullet" {type=arrow}
@bullet "Star bullet" {type=star}
@newpage
@page 3
@heading "Conclusion"
@text "This document demonstrates all standard EPP 0.2 features."
@quote "A format should be as simple as possible, but no simpler."
@text "End of document."
`;

let doc=hydrate(parseEPP(SAMPLE));
let mode='edit', currentPageIndex=0, activeBlockId=null;
function currentPage(){ return doc.pages[currentPageIndex]; }
function findBlock(id){ return currentPage().blocks.find(b=>b.id===id); }
function findBlockIndex(id){ return currentPage().blocks.findIndex(b=>b.id===id); }

/* ========================================================
   DOM helpers
   ======================================================== */
function textToDom(el,text){
  el.innerHTML='';
  const parts=String(text).split('[newline]');
  parts.forEach((p,i)=>{ el.appendChild(document.createTextNode(p)); if(i<parts.length-1)el.appendChild(document.createElement('br')); });
}
function domToText(el){ let o=''; el.childNodes.forEach(n=>{ if(n.nodeType===Node.TEXT_NODE)o+=n.textContent; else if(n.nodeName==='BR')o+='[newline]'; else o+=n.textContent; }); return o; }
function applyBlockStyle(el,block){
  if(block.type==='code'||block.type==='quote'){ el.style.color=''; el.style.textAlign=''; el.style.fontWeight=''; return; }
  el.style.color=(block.attrs.color&&COLOR_MAP[block.attrs.color])?COLOR_MAP[block.attrs.color]:'';
  el.style.textAlign=ALIGN_VALUES.includes(block.attrs.align)?block.attrs.align:'left';
  el.style.fontWeight=block.attrs.bold?'700':(block.type==='heading'?'600':'400');
  el.style.fontStyle=block.attrs.italic?'italic':'';
  el.style.textDecoration=block.attrs.underline?'underline':'';
}

/* ========================================================
   Edit-mode rendering
   ======================================================== */
function placeholderFor(t){ return t==='heading'?'Heading':t==='bullet'?'List item':t==='code'?'Code':t==='quote'?'Quote…':'Type something…'; }

function mkBtn(cls,label,title){ const b=document.createElement('button'); b.className=cls; b.textContent=label; b.title=title; b.type='button'; return b; }

function buildBlockElement(block){
  const row=document.createElement('div');
  row.className='block-row'; row.dataset.id=block.id;
  const handle=document.createElement('div'); handle.className='block-handle';
  const upBtn=mkBtn('h-btn','↑','Move up');
  const downBtn=mkBtn('h-btn','↓','Move down');
  const delBtn=mkBtn('h-btn','×','Delete');
  upBtn.addEventListener('click',()=>moveBlock(block.id,-1));
  downBtn.addEventListener('click',()=>moveBlock(block.id,1));
  delBtn.addEventListener('click',()=>deleteBlock(block.id));
  handle.append(upBtn,downBtn,delBtn); row.appendChild(handle);

  if(block.type==='space'){ const d=document.createElement('div'); d.className='block-space-visual'; d.textContent='space'; row.appendChild(d); return row; }
  if(block.type==='line'){ const hr=document.createElement('hr'); hr.className='block-line-visual'; row.appendChild(hr); return row; }
  if(block.type==='label'){
    const d=document.createElement('div'); d.className='block-label-visual';
    const tag=document.createElement('span'); tag.textContent='🔖';
    const inp=document.createElement('input'); inp.className='label-name-input'; inp.value=block.name;
    inp.addEventListener('input',()=>{ block.name=inp.value; });
    d.append(tag,inp); row.appendChild(d); return row;
  }
  if(block.type==='table'){
    const d=document.createElement('div'); d.className='table-edit-visual';
    d.textContent='[@table] '+block.headers.join(' | ')+' ('+( block.rows?block.rows.length:0)+' rows)';
    row.appendChild(d); return row;
  }
  const tag=block.type==='code'?'pre':'div';
  const content=document.createElement(tag);
  const cls='block-content '+block.type+'-content';
  content.className=cls;
  content.setAttribute('contenteditable','true');
  content.dataset.placeholder=placeholderFor(block.type);
  textToDom(content,block.text);
  applyBlockStyle(content,block);
  content.addEventListener('focus',()=>setActiveBlock(block.id));
  content.addEventListener('input',()=>{ block.text=domToText(content); });
  content.addEventListener('blur',()=>{ block.text=domToText(content); });
  content.addEventListener('keydown',(e)=>handleBlockKeydown(e,block,content));
  row.appendChild(content); return row;
}

function renderEditPage(){
  const paper=document.getElementById('paper');
  paper.innerHTML='';
  // header band
  if(doc.header){ const d=document.createElement('div'); d.className='paper-header-band'; d.textContent=doc.header; paper.appendChild(d); }
  const body=document.createElement('div'); body.className='paper-body';
  const page=currentPage();
  page.blocks.forEach(block=>body.appendChild(buildBlockElement(block)));
  const addRow=document.createElement('div'); addRow.className='add-block-row';
  const addBtn=mkBtn('','+ Add block','');
  addBtn.addEventListener('click',(e)=>{ e.stopPropagation(); toggleAddMenu(addRow); });
  addRow.appendChild(addBtn); body.appendChild(addRow);
  paper.appendChild(body);
  // footer band
  if(doc.footer){ const d=document.createElement('div'); d.className='paper-footer-band'; d.textContent=doc.footer.replace('[page]',doc.pages[currentPageIndex].number||String(currentPageIndex+1)); paper.appendChild(d); }
  if(activeBlockId&&!findBlock(activeBlockId))activeBlockId=null;
  syncToolbar();
}

function toggleAddMenu(addRow){
  const existing=addRow.querySelector('.add-menu'); if(existing){existing.remove();return;}
  const menu=document.createElement('div'); menu.className='add-menu';
  [['heading','Heading'],['text','Text'],['bullet','Bullet'],['quote','Quote'],['code','Code'],['line','Horizontal line'],['space','Space'],['label','Label (bookmark)']].forEach(([type,label])=>{
    const b=document.createElement('button'); b.type='button'; b.textContent=label;
    b.addEventListener('click',()=>{ addBlock(type); menu.remove(); });
    menu.appendChild(b);
  });
  addRow.appendChild(menu);
  setTimeout(()=>{ document.addEventListener('click',function c(ev){ if(!addRow.contains(ev.target)){menu.remove();document.removeEventListener('click',c);} }); },0);
}

function addBlock(type){ const b=newBlock(type); currentPage().blocks.push(b); renderEditPage(); if(type!=='space'&&type!=='line')focusBlock(b.id); }
function moveBlock(id,dir){ const blocks=currentPage().blocks; const idx=blocks.findIndex(b=>b.id===id); const ni=idx+dir; if(ni<0||ni>=blocks.length)return; [blocks[idx],blocks[ni]]=[blocks[ni],blocks[idx]]; renderEditPage(); }
function deleteBlock(id){ const blocks=currentPage().blocks; const idx=blocks.findIndex(b=>b.id===id); if(idx===-1)return; blocks.splice(idx,1); renderEditPage(); }
function insertBlockAfter(refId,block){ const blocks=currentPage().blocks; const idx=blocks.findIndex(b=>b.id===refId); blocks.splice(idx+1,0,block); }
function focusBlock(id,pos='start'){
  setTimeout(()=>{
    const row=document.querySelector('.block-row[data-id="'+id+'"]'); if(!row)return;
    const el=row.querySelector('[contenteditable]')||row.querySelector('.label-name-input'); if(!el)return;
    el.focus();
    if(el.getAttribute('contenteditable')==='true'){
      const r=document.createRange(); r.selectNodeContents(el); r.collapse(pos!=='end');
      const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  },0);
}
function insertBreakAtCursor(){
  let h=false; try{h=document.execCommand('insertLineBreak');}catch(e){h=false;}
  if(h)return;
  const sel=window.getSelection(); if(!sel||!sel.rangeCount)return;
  const r=sel.getRangeAt(0); r.deleteContents();
  const br=document.createElement('br'); r.insertNode(br); r.setStartAfter(br); r.collapse(true);
  sel.removeAllRanges(); sel.addRange(r);
}
function handleBlockKeydown(e,block,content){
  if(e.key==='Enter'){
    if(block.type==='code'||block.type==='quote'||e.shiftKey){ e.preventDefault(); insertBreakAtCursor(); block.text=domToText(content); return; }
    e.preventDefault(); block.text=domToText(content);
    if(block.type==='bullet'&&block.text.trim()===''){ block.type='text'; renderEditPage(); focusBlock(block.id); return; }
    const fresh=newBlock(block.type==='heading'?'text':block.type,'');
    insertBlockAfter(block.id,fresh); renderEditPage(); focusBlock(fresh.id); return;
  }
  if(e.key==='Backspace'){
    const text=domToText(content);
    if(text.trim()===''){ const idx=findBlockIndex(block.id); if(idx>0){ e.preventDefault(); const prev=currentPage().blocks[idx-1]; deleteBlock(block.id); if(prev.type!=='space'&&prev.type!=='label'&&prev.type!=='line')focusBlock(prev.id,'end'); } }
  }
}

/* ========================================================
   Toolbar
   ======================================================== */
function buildColorSwatches(){
  const group=document.getElementById('colorGroup'); group.innerHTML='';
  SWATCH_COLORS.forEach(name=>{ const sw=document.createElement('button'); sw.type='button'; sw.className='swatch'; sw.title=name; sw.style.background=COLOR_MAP[name]; sw.dataset.color=name; sw.addEventListener('click',()=>setBlockColor(name)); group.appendChild(sw); });
}
function setActiveBlock(id){ activeBlockId=id; syncToolbar(); }
function syncToolbar(){
  const toolbar=document.getElementById('toolbar');
  const block=activeBlockId?findBlock(activeBlockId):null;
  const editable=block&&TEXT_TYPES.includes(block.type);
  toolbar.classList.toggle('disabled',!editable);
  const typeSelect=document.getElementById('typeSelect');
  const formatDisabled=!editable||block.type==='code';
  ['boldBtn','italBtn','underBtn','alignLeft','alignCenter','alignRight'].forEach(id=>{ const el=document.getElementById(id); el.style.opacity=formatDisabled?.35:1; el.style.pointerEvents=formatDisabled?'none':'auto'; });
  document.querySelectorAll('.swatch').forEach(el=>{ el.style.opacity=formatDisabled?.35:1; el.style.pointerEvents=formatDisabled?'none':'auto'; });
  if(editable)typeSelect.value=block.type;
  document.getElementById('boldBtn').classList.toggle('active',!!(block&&block.attrs.bold));
  document.getElementById('italBtn').classList.toggle('active',!!(block&&block.attrs.italic));
  document.getElementById('underBtn').classList.toggle('active',!!(block&&block.attrs.underline));
  ['left','center','right'].forEach(dir=>{ const el=document.getElementById('align'+dir.charAt(0).toUpperCase()+dir.slice(1)); const isActive=block&&(block.attrs.align===dir||(dir==='left'&&!block.attrs.align)); el.classList.toggle('active',!!isActive); });
  document.querySelectorAll('.swatch').forEach(sw=>{ sw.classList.toggle('active',!!(block&&block.attrs.color===sw.dataset.color)); });
}
function withActiveBlock(fn){
  if(!activeBlockId)return; const block=findBlock(activeBlockId);
  if(!block||!TEXT_TYPES.includes(block.type))return;
  fn(block);
  const row=document.querySelector('.block-row[data-id="'+block.id+'"]');
  const el=row&&row.querySelector('[contenteditable]');
  if(el)applyBlockStyle(el,block); syncToolbar();
}

document.getElementById('typeSelect').addEventListener('change',(e)=>{ withActiveBlock(block=>{ block.type=e.target.value; if(block.type==='code')block.attrs={}; renderEditPage(); focusBlock(block.id,'end'); }); });
document.getElementById('boldBtn').addEventListener('click',()=>withActiveBlock(block=>{ if(block.attrs.bold)delete block.attrs.bold; else block.attrs.bold=true; }));
document.getElementById('italBtn').addEventListener('click',()=>withActiveBlock(block=>{ if(block.attrs.italic)delete block.attrs.italic; else block.attrs.italic=true; }));
document.getElementById('underBtn').addEventListener('click',()=>withActiveBlock(block=>{ if(block.attrs.underline)delete block.attrs.underline; else block.attrs.underline=true; }));
document.getElementById('alignLeft').addEventListener('click',()=>withActiveBlock(block=>{ block.attrs.align='left'; }));
document.getElementById('alignCenter').addEventListener('click',()=>withActiveBlock(block=>{ block.attrs.align='center'; }));
document.getElementById('alignRight').addEventListener('click',()=>withActiveBlock(block=>{ block.attrs.align='right'; }));
function setBlockColor(name){ withActiveBlock(block=>{ if(block.attrs.color===name)delete block.attrs.color; else block.attrs.color=name; }); }
buildColorSwatches();

/* ========================================================
   Preview rendering
   ======================================================== */
function escHtml(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderInline(text){ return escHtml(text).split('[newline]').join('<br>'); }

function renderPreviewPage(previewDoc,pageIndex){
  const paper=document.getElementById('paper');
  paper.innerHTML='';
  // header
  if(previewDoc.header){ const d=document.createElement('div'); d.className='paper-header-band'; d.textContent=previewDoc.header; paper.appendChild(d); }
  const body=document.createElement('div'); body.className='paper-body';
  const page=previewDoc.pages[pageIndex];
  if(!page){ body.innerHTML='<p class="empty-hint">Nothing here.</p>'; paper.appendChild(body); return; }
  let html='', openList=false, listCounter=0, total=page.blocks.length;
  page.blocks.forEach((block,idx)=>{
    if(block.type!=='bullet'&&openList){html+='</ul>';openList=false;listCounter=0;}
    const color=(block.attrs&&COLOR_MAP[block.attrs.color])||'';
    const align=(block.attrs&&ALIGN_VALUES.includes(block.attrs.align))?block.attrs.align:'left';
    function st(){ return (color?'color:'+color+';':'')+'text-align:'+align+';'+(block.attrs.bold?'font-weight:700;':'')+(block.attrs.italic?'font-style:italic;':'')+(block.attrs.underline?'text-decoration:underline;':''); }
    if(block.type==='heading') html+='<h2 class="epp-heading" style="'+st()+'">'+renderInline(block.text)+'</h2>';
    else if(block.type==='text') html+='<p class="epp-text" style="'+st()+'">'+renderInline(block.text)+'</p>';
    else if(block.type==='quote') html+='<blockquote class="epp-quote">'+renderInline(block.text)+'</blockquote>';
    else if(block.type==='bullet'){
      const bt=(block.attrs&&block.attrs.type)||'disc';
      if(!openList){html+='<ul class="epp-bullets">';openList=true;listCounter=0;}
      listCounter++;
      const glyph=bt==='number'?(listCounter+'.'):(BULLET_GLYPHS[bt]||'•');
      html+='<li '+(color?'style="color:'+color+'"':'')+'>'+
        '<span class="epp-bullet-glyph">'+glyph+'</span>'+renderInline(block.text)+'</li>';
    }
    else if(block.type==='code') html+='<pre class="epp-code">'+escHtml(block.text).split('[newline]').join('\n')+'</pre>';
    else if(block.type==='line') html+='<hr class="epp-line">';
    else if(block.type==='space') html+='<div class="epp-space"></div>';
    else if(block.type==='table'){
      html+='<table class="epp-table"><thead><tr>';
      block.headers.forEach(h=>{html+='<th>'+escHtml(h.trim())+'</th>';});
      html+='</tr></thead><tbody>';
      (block.rows||[]).forEach(r=>{html+='<tr>';r.forEach(c=>{html+='<td>'+escHtml(c.trim())+'</td>';});html+='</tr>';});
      html+='</tbody></table>';
    }
    else if(block.type==='label'){
      const tp=total<=1?50:(idx/(total-1))*86+6;
      html+='<div class="label-tab" style="top:'+tp+'%" title="label: '+escHtml(block.name)+'">'+escHtml(block.name)+'</div>';
    }
  });
  if(openList)html+='</ul>';
  body.innerHTML=html||'<p class="empty-hint">This page is empty.</p>';
  paper.appendChild(body);
  // footer
  if(previewDoc.footer){
    const ft=previewDoc.footer.replace('[page]',page.number||String(pageIndex+1));
    const d=document.createElement('div'); d.className='paper-footer-band'; d.textContent=ft; paper.appendChild(d);
  }
}

/* ========================================================
   Navigation & top-level refresh
   ======================================================== */
function refreshAll(){
  const total=doc.pages.length;
  currentPageIndex=Math.max(0,Math.min(currentPageIndex,total-1));
  const page=doc.pages[currentPageIndex];
  const label=page&&page.number?page.number:String(currentPageIndex+1);
  document.getElementById('pageIndicator').textContent=label+' / '+total;
  document.getElementById('prevBtn').disabled=currentPageIndex===0;
  document.getElementById('nextBtn').disabled=currentPageIndex===total-1;
  document.getElementById('delPageBtn').disabled=total<=1;
  document.getElementById('versionStamp').textContent='epp '+(doc.version||'0.2');
  document.getElementById('titleInput').value=doc.title||'';
  if(mode==='edit') renderEditPage();
  else renderPreviewPage(hydrate(parseEPP(serializeEPP(doc))),currentPageIndex);
}

function setMode(newMode){ mode=newMode; document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode)); document.getElementById('toolbar').classList.toggle('hidden',mode!=='edit'); refreshAll(); }
document.getElementById('modeSeg').addEventListener('click',(e)=>{ const btn=e.target.closest('button'); if(!btn)return; setMode(btn.dataset.mode); });
document.getElementById('prevBtn').addEventListener('click',()=>{ if(currentPageIndex>0){currentPageIndex--;refreshAll();} });
document.getElementById('nextBtn').addEventListener('click',()=>{ if(currentPageIndex<doc.pages.length-1){currentPageIndex++;refreshAll();} });
document.getElementById('newPageBtn').addEventListener('click',()=>{ doc.pages.splice(currentPageIndex+1,0,newPageModel()); currentPageIndex++; refreshAll(); });
document.getElementById('delPageBtn').addEventListener('click',()=>{ if(doc.pages.length<=1)return; doc.pages.splice(currentPageIndex,1); refreshAll(); });
document.getElementById('titleInput').addEventListener('input',(e)=>{ doc.title=e.target.value; });

window.addEventListener('keydown',(e)=>{
  const el=document.activeElement; if(!el)return;
  if(el.closest&&el.closest('[contenteditable="true"]'))return;
  if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(currentPageIndex<doc.pages.length-1){currentPageIndex++;refreshAll();}}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(currentPageIndex>0){currentPageIndex--;refreshAll();}}
});

/* import / export / source */
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',(e)=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader(); reader.onload=()=>{ doc=hydrate(parseEPP(reader.result)); currentPageIndex=0; activeBlockId=null; refreshAll(); }; reader.readAsText(file);
});
document.getElementById('exportBtn').addEventListener('click',()=>{
  const src=serializeEPP(doc); const blob=new Blob([src],{type:'text/plain'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=(doc.title||'document').trim().replace(/\s+/g,'-').toLowerCase()+'.epp'; a.click(); URL.revokeObjectURL(url);
});
document.getElementById('sourceBtn').addEventListener('click',()=>{ document.getElementById('sourceText').textContent=serializeEPP(doc); document.getElementById('sourceModal').classList.add('open'); });
document.getElementById('closeModalBtn').addEventListener('click',()=>document.getElementById('sourceModal').classList.remove('open'));
document.getElementById('copySourceBtn').addEventListener('click',()=>{ navigator.clipboard.writeText(document.getElementById('sourceText').textContent); });

refreshAll();
</script>
