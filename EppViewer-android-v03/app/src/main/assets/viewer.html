<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=3"/>
<link rel="stylesheet" href="epp-style.css"/>
<style>
  /* Android shell — suppress the web toolbar, native toolbar handles it */
  .epp-toolbar{ display:none !important; }

  html, body{ margin:0; padding:0; background:#141413; overflow-x:hidden; }

  .epp-pages{
    display:flex; flex-direction:column;
    align-items:center; gap:20px;
    padding:16px 10px 48px;
  }
  .epp-page{ width:min(540px, 96vw); }

  /* Loading */
  #epp-loading{
    display:flex; align-items:center; justify-content:center;
    height:60vh;
    font-family:ui-monospace,monospace; font-size:13px;
    color:#a39d8c; letter-spacing:.06em;
  }
  #epp-loading.hidden{ display:none; }

  /* Error */
  #epp-error{
    display:none;
    margin:40px auto; max-width:480px; padding:20px 24px;
    background:#2a1a1a; border:1px solid #5a2a2a; border-radius:4px;
    font-family:ui-monospace,monospace; font-size:13px;
    color:#c2564b; line-height:1.6;
  }
  #epp-error.visible{ display:block; }

  /* Welcome screen */
  #epp-welcome{
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:70vh; padding:40px 24px; text-align:center;
    font-family:'Palatino Linotype',Palatino,Georgia,serif;
    color:#a39d8c;
  }
  #epp-welcome .w-title{
    font-size:28px; font-weight:400; color:#e7e2d3;
    margin-bottom:8px; letter-spacing:.02em;
  }
  #epp-welcome .w-sub{
    font-size:14px; font-style:italic; margin-bottom:32px; color:#6b6660;
  }
  #epp-welcome .w-hint{
    font-family:ui-monospace,monospace; font-size:11px;
    letter-spacing:.1em; text-transform:uppercase; color:#5b5950;
    border:1px solid #33322c; border-radius:3px; padding:8px 16px;
  }

  #epp-root{ display:none; }

  /* Ensure colours/backgrounds print correctly if user prints */
  * { print-color-adjust:exact; -webkit-print-color-adjust:exact; }
</style>
</head>
<body>

<div id="epp-loading">Loading…</div>
<div id="epp-error"></div>

<div id="epp-welcome">
  <div class="w-title">EPP Viewer</div>
  <div class="w-sub">Easy Paper Package v0.3</div>
  <div class="w-hint">Open a .epp file to begin</div>
</div>

<div id="epp-root"></div>

<script src="epp-core.js"></script>
<script>
var currentDoc = null;

/* Called by Kotlin after it reads the file */
function loadEPP(source) {
  try {
    hideWelcome();
    showLoading();
    var doc = parseEPP(source);
    currentDoc = doc;
    var pagesHtml = renderDocumentHTML(doc);
    var root = document.getElementById('epp-root');
    root.innerHTML = '<div class="epp-pages">' + pagesHtml + '</div>';
    hideLoading();
    hideError();
    root.style.display = 'block';
    if (window.EppBridge) {
      EppBridge.onDocumentReady(doc.title || '', doc.pages ? doc.pages.length : 0);
    }
  } catch (e) {
    showError('Could not parse document:\n' + e.message);
  }
}

/* Kotlin can call this to jump to a specific page index */
function scrollToPage(index) {
  var pages = document.querySelectorAll('.epp-page');
  if (pages[index]) pages[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showLoading() {
  var el = document.getElementById('epp-loading');
  el.textContent = 'Loading\u2026';
  el.classList.remove('hidden');
}
function hideLoading() { document.getElementById('epp-loading').classList.add('hidden'); }
function showError(msg) {
  hideLoading(); hideWelcome();
  var el = document.getElementById('epp-error');
  el.textContent = msg; el.classList.add('visible');
  if (window.EppBridge) EppBridge.onError(msg);
}
function hideError() { document.getElementById('epp-error').classList.remove('visible'); }
function hideWelcome() { document.getElementById('epp-welcome').style.display = 'none'; }
</script>
</body>
</html>
